name: Generate demo GIF

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-gif:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Ожидание сборки на Vercel (можно увеличить до 120, если сайт долго грузится)
      - name: Wait for Vercel deployment
        run: sleep 60

      - name: Generate GIF from website
        uses: PabloLec/website-to-gif@master
        with:
          url: "https://gaba-progect.vercel.app/"
          dest: "preview.gif"
          width: 1280
          height: 720
          duration: 10000     # Запись 10 секунд
          scroll: true        # Плавная прокрутка вниз
          fps: 15             # Частота кадров

      - name: Commit and Push GIF
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add preview.gif
          git commit -m "docs: update demo gif [skip ci]" || echo "No changes to commit"
          git push
