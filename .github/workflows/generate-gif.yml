name: Generate demo file

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-gif:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Website to GIF
        uses: pablolec/website-to-gif@main
        with:
          url: "https://docs.github.com/en/get-started"
          dest: "preview.gif"
          width: 1280
          height: 720
          duration: 8000
          fps: 15

      - name: Commit GIF to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add preview.gif
          git commit -m "chore: update demo gif" || echo "No changes to commit"
          git push
