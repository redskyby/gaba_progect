name: Generate demo GIF

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-gif:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for site to be ready
        run: |
          for i in {1..30}; do
            if curl -s -o /dev/null -w "%{http_code}" https://gaba-progect.vercel.app/ | grep "200"; then
              echo "Site is up!"
              exit 0
            fi
            echo "Waiting..."
            sleep 5
          done
          echo "Site did not become ready"
          exit 1

      - name: Generate GIF
        uses: pablolec/website-to-gif@main
        with:
          url: "https://gaba-progect.vercel.app/"
          save_path: "."
          file_name: "demo.gif"
          window_width: 1280
          window_height: 720
          number_of_frames: 120
          time_per_frame: 150
          scroll_step: 250

      - name: Debug files
        run: |
          echo "Files:"
          ls -la
          find . -name "*.gif"

      - name: Commit GIF
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -f "demo.gif" ]; then
            git add demo.gif
            git commit -m "chore: update demo gif [skip ci]" || echo "No changes"
            git push
          else
            echo "❌ GIF not found"
            exit 1
          fi