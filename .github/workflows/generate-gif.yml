name: Generate demo GIF

on:
  push:
    branches: [ "main" ] # Запускаем только при пуше в основную ветку
  workflow_dispatch:      # Чтобы можно было запустить кнопкой для теста

permissions:
  contents: write

jobs:
  generate-gif:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for Vercel deploy
        run: sleep 90

      - name: Generate GIF
        uses: pablolec/website-to-gif@main
        with:
          url: "https://gaba-progect.vercel.app/"
          # Указываем полный путь к файлу в рабочей директории
          dest: "${{ github.workspace }}/preview.gif"
          width: 1280
          height: 720
          duration: 8000
          fps: 15
          # Добавляем аргументы для стабильного запуска Chrome в Docker/Ubuntu
          args: "--no-sandbox --disable-setuid-sandbox"

      - name: Debug files
        run: |
          echo "Проверяем наличие файла:"
          ls -la ${{ github.workspace }}/preview.gif || echo "Файл НЕ НАЙДЕН"

      - name: Commit GIF
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Проверяем, существует ли файл, прежде чем добавлять
          if [ -f "demo.gif" ]; then
          git add demo.gif
          # [skip ci] крайне важен!
          git commit -m "chore: update demo gif [skip ci]" || echo "No changes"
          git push
          else
            echo "Ошибка: demo.gif не был создан. Проверьте логи шага Generate GIF."
            exit 1
          fi
