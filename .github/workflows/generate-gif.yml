name: Generate demo GIF

on: push

permissions:
  contents: write

jobs:
  generate-gif:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Wait for Vercel deploy
        run: sleep 90

      - name: Generate GIF
        uses: pablolec/website-to-gif@main
        with:
          url: "https://gaba-progect.vercel.app/"
          dest: "preview.gif"
          width: 1280
          height: 720
          duration: 8000
          fps: 15

      - name: Debug files
        run: ls -la

      - name: Commit GIF
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add preview.gif
          git commit -m "chore: update demo gif" || echo "No changes"
          git push
